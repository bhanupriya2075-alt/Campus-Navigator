<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – Manage Locations</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
    }

    #mapAdmin {
      width: 60%;
      height: 100%;
    }

    #adminControls {
      width: 40%;
      padding: 15px;
      background: #f5f5f5;
      overflow-y: auto;
    }

    input, select, button {
      display: block;
      margin: 8px 0;
      padding: 6px;
      width: 95%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 5px;
      text-align: left;
    }

    th {
      background: #ddd;
    }

    .text-label {
      background: rgba(255,255,255,0.9);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 12px;
    }

    .floor-buttons button {
      width: 22%;
      display: inline-block;
      margin-right: 2%;
      padding: 8px;
      font-weight: bold;
      background: #ccc;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    .floor-buttons button.active {
      background: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>

  <div id="mapAdmin"></div>

  <div id="adminControls">
    <h2>Admin – Manage Locations</h2>

    <div class="floor-buttons">
      <button onclick="switchFloor(0)" id="floorBtn0">Floor 0</button>
      <button onclick="switchFloor(1)" id="floorBtn1">Floor 1</button>
      <button onclick="switchFloor(2)" id="floorBtn2">Floor 2</button>
      <button onclick="switchFloor(3)" id="floorBtn3">Floor 3</button>
    </div>

    <input id="roomName" placeholder="Room name" />
    <input id="roomDesc" placeholder="Description" />
    <input id="adminPass" type="password" placeholder="Admin Password" />

    <button onclick="saveLocation()">➕ Add / Update Location</button>
    <button onclick="deleteLocation()">🗑️ Delete Selected Location</button>

    <h3>Existing Locations</h3>
    <table id="locTable">
      <thead>
        <tr><th>ID</th><th>Room</th><th>Floor</th><th>Action</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="admin.js"></script>
</body>
</html>
